# ─────────────────────────────────────────────────────────────
# Neon Events Elements — Odoo 17 Community (Phase 1 CRM build)
# Localhost access: http://localhost:8069
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:15
    container_name: neon-odoo-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - neon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:17
    container_name: neon-odoo-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"   # Web UI
      - "8072:8072"   # Longpolling / live chat
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./oca/queue:/mnt/oca-queue
      - ./oca/server-tools:/mnt/oca-server-tools
      - ./oca/web:/mnt/oca-web
    restart: unless-stopped
    networks:
      - neon-net

volumes:
  odoo-db-data:
  odoo-web-data:

networks:
  neon-net:
    driver: bridge